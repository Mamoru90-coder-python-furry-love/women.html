<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З 8 Березня! 💐</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Фон з анімацією градієнта */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff758c, #ff7eb3, #ff9a9e, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align: center;
            color: white;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Блок привітання */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            color: black;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            color: #ff4f72;
            font-size: 32px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 2px 2px 10px rgba(255, 105, 135, 0.8);
            animation: bounce 1s infinite alternate;
        }

        p {
            font-size: 18px;
            color: #444;
        }

        /* Кнопка */
        .btn {
            background: #ff4f72;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            box-shadow: 0 5px 10px rgba(255, 79, 114, 0.5);
        }

        .btn:hover {
            background: #d12c58;
            transform: scale(1.1);
        }

        /* Анімація градієнта */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Анімація тексту */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Падаючі пелюстки */
        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: pink;
            border-radius: 50%;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>З 8 Березня, Дівчата! 💐</h1>
        <p>Нехай цей день буде наповнений радістю, ніжністю та посмішками!<br> 
           Бажаю вам море щастя, весняного тепла і здійснення мрій! 💖</p>
        <button class="btn" onclick="playMusic()">🎶 Увімкнути музику</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-littleidea.mp3" type="audio/mpeg">
        Ваш браузер не підтримує аудіо.
    </audio>

    <script>
        function playMusic() {
            let audio = document.getElementById("bgMusic");
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // Додавання пелюсток
        function createPetal() {
            const petal = document.createElement("div");
            petal.classList.add("petal");
            document.body.appendChild(petal);

            petal.style.left = Math.random() * 100 + "vw";
            petal.style.animationDuration = Math.random() * 5 + 5 + "s";

            setTimeout(() => {
                petal.remove();
            }, 10000);
        }

        setInterval(createPetal, 500);
    </script>

</body>
</html>
