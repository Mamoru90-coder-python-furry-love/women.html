<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З 8 Березня! 💐</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Фон */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff758c, #ff7eb3, #ff9a9e, #fad0c4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align: center;
            color: white;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Приховати зайві елементи */
        h1:first-child {
            display: none; /* Ховаємо перший заголовок */
        }

        /* Блок привітання */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            color: black;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            color: #ff4f72;
            font-size: 32px;
            font-family: 'Dancing Script', cursive;
            text-shadow: 2px 2px 10px rgba(255, 105, 135, 0.8);
        }

        p {
            font-size: 18px;
            color: #444;
        }

        /* Приховати зайвий текст */
        p:last-child {
            display: none;
        }

        /* Кнопка */
        .btn {
            background: #ff4f72;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            box-shadow: 0 5px 10px rgba(255, 79, 114, 0.5);
        }

        .btn:hover {
            background: #d12c58;
            transform: scale(1.1);
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>З 8 Березня, Дівчата! 💐</h1>
        <p>Нехай цей день буде наповнений радістю, ніжністю та посмішками!<br> 
           Бажаю вам море щастя, весняного тепла і здійснення мрій! 💖</p>
        <button class="btn" onclick="playMusic()">🎶 Увімкнути музику</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-littleidea.mp3" type="audio/mpeg">
        Ваш браузер не підтримує аудіо.
    </audio>

    <script>
        function playMusic() {
            let audio = document.getElementById("bgMusic");
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
